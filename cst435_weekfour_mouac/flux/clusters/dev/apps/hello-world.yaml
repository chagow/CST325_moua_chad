# Same structure as prod but pointing at the dev overlay.
# Dev reconciles more frequently (1m vs 5m) because fast feedback
# matters more than cluster load at development scale.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hello-world-dev
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./k8s/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: cst435-weekfour
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: hello-world
      namespace: hello-world-dev
  retryInterval: 30s
  timeout: 3m0s
