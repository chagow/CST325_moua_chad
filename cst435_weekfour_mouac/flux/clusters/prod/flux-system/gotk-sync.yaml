# This file is generated by `flux bootstrap github` and should not be
# edited by hand. It instructs Flux to reconcile the cluster state from
# the flux/clusters/prod path in this repository.
#
# Bootstrap command (run once per cluster):
#
#   flux bootstrap github \
#     --owner=GITHUB_USERNAME \
#     --repository=cst435_weekfour_mouac \
#     --branch=main \
#     --path=flux/clusters/prod \
#     --personal
#
# Flux creates a Deploy Key on the repo and installs its controllers in
# the flux-system namespace. After bootstrap, only push to Git — Flux
# detects the change and applies it within `interval` seconds.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cst435-weekfour
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  url: https://github.com/GITHUB_USERNAME/cst435_weekfour_mouac
  # secretRef points to the SSH deploy key Flux creates during bootstrap.
  secretRef:
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./flux/clusters/prod
  prune: true
  sourceRef:
    kind: GitRepository
    name: cst435-weekfour
