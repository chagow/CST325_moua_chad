apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hello-world-dev

resources:
  - ../../base

# Update the image tag to the dev-specific sha (set by CI with `kustomize edit set image`)
images:
  - name: hello-world
    newName: ghcr.io/GITHUB_USERNAME/cst435_weekfour_mouac
    newTag: latest

patches:
  # Single replica is fine for dev; HPA min also reduced
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: hello-world
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler
      name: hello-world
  # Tighter resource limits in dev to save cluster cost
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "25m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
    target:
      kind: Deployment
      name: hello-world

commonLabels:
  environment: dev
