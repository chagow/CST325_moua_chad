name: Docker Build, Test, and Push

on:
  push:
    branches: [main, master]
    paths-ignore: ['k8s/**', 'flux/**']
  pull_request:
    branches: [main, master]
    paths-ignore: ['k8s/**', 'flux/**']

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
# Job dependency graph:
#
#   lint ────┐
#             ├──▶ build ──▶ scan ──▶ push ──▶ update-manifests
#   test ────┘
#
# Lint and unit tests run in parallel. The container build waits for both.
# Trivy scans the built image before any push can happen.
# GitOps manifest update only runs after a successful push to the registry.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache keyed to the lockfile path. Falls back gracefully if
          # package-lock.json hasn't been committed yet.
          cache: npm
          cache-dependency-path: node-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-test:
    name: Unit tests (node:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: node-app/package-lock.json

      - run: npm ci
      - run: npm test

  # ── 3. Container build + integration smoke test ───────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image (test target)
        uses: docker/build-push-action@v6
        with:
          context: ./claude-my-project
          file: ./claude-my-project/Dockerfile.hello
          load: true      # load into local daemon so we can run and export it
          tags: app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Integration smoke test
        run: |
          docker run -d --name test-app -p 8080:8080 app:test
          sleep 2
          curl --fail --retry 5 --retry-delay 1 http://localhost:8080/healthz
          curl --fail http://localhost:8080/readyz
          curl --fail http://localhost:8080/
          docker stop test-app && docker rm test-app

      # Export the image so `scan` can analyse it without rebuilding.
      # retention-days: 1 keeps artifact storage costs negligible.
      - name: Export image tarball
        run: docker save app:test | gzip > /tmp/app-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/app-image.tar.gz
          retention-days: 1

  # ── 4. Vulnerability scan ──────────────────────────────────────────────────
  scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      security-events: write   # required to upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/app-image.tar.gz

      # Scan OS packages and language runtime libraries for CVEs.
      # exit-code '1' blocks the push job when HIGH or CRITICAL findings exist.
      # ignore-unfixed: skip vulns with no available fix — no action we can take.
      - name: Scan for CVEs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref:      app:test
          format:         sarif
          output:         trivy-image.sarif
          severity:       HIGH,CRITICAL
          exit-code:      '1'
          ignore-unfixed: true

      # Upload regardless of whether the scan found issues, so findings always
      # appear in the Security → Code scanning tab for review.
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category:   trivy-image

  # ── 5. Push to registry ────────────────────────────────────────────────────
  push:
    name: Push to ghcr.io
    runs-on: ubuntu-latest
    needs: [scan]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write    # needed by the git push in update-manifests
      packages: write
    outputs:
      sha-tag: ${{ steps.tag.outputs.sha-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Compute SHA tag
        id: tag
        run: echo "sha-tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      # Rebuild from the warm GHA layer cache and push — effectively free.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./claude-my-project
          file: ./claude-my-project/Dockerfile.hello
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. GitOps manifest update ──────────────────────────────────────────────
  update-manifests:
    name: Pin image tag in prod overlay
    runs-on: ubuntu-latest
    needs: [push]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.1/kustomize_v5.4.1_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Update image tag
        run: |
          cd k8s/overlays/prod
          kustomize edit set image \
            hello-world=ghcr.io/${{ github.repository }}:${{ needs.push.outputs.sha-tag }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kustomization.yaml
          git diff --cached --quiet \
            || git commit -m "chore: pin prod image to ${{ needs.push.outputs.sha-tag }} [skip ci]"
          git push
